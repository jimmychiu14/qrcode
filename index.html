<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>QR Code Scanner Demo</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="scanner">
      <section class="panel" aria-labelledby="page-title">
        <h1 id="page-title">QR Code Scanner</h1>

        <label class="field">
          <span>掃描結果</span>
          <textarea id="qr-result" rows="4" placeholder="按下按鈕後掃描 QR code，內容會顯示在這裡" readonly></textarea>
        </label>

        <div class="actions">
          <button id="start-button" type="button">開啟相機掃描</button>
          <button id="stop-button" type="button" hidden>停止掃描</button>
        </div>

        <p id="status" class="status" role="status">等待開始掃描。</p>

        <div id="camera-box" class="camera-box" hidden>
          <video id="camera" playsinline muted></video>
          <canvas id="qr-canvas" hidden></canvas>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
